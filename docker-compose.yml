version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PORT=3000
    restart: always

  frontend:
    image: nginx:alpine
    ports:
      - "5500:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
    restart: always
